name: Update results & deploy

# Two modes, one workflow:
#   • push to main        → just rebuild the site & deploy (fast, no scraping)
#   • schedule / manual   → scrape every club, commit fresh data, build & deploy
# The site is built from app/ + clubs/<slug>/ into _site/ and that is what deploys.
on:
  schedule:
    - cron: "0 6 * * *"   # 06:00 UTC daily
  workflow_dispatch:
    inputs:
      simulate:
        description: "Slug to force-fail this run (fallback test, e.g. psc). Leave blank normally; self-heals next run."
        required: false
        default: ""
  push:
    branches: [main]

permissions:
  contents: write   # commit the refreshed results.js
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so the commit step can rebase before pushing

      # Node is needed for the build (both modes) and the scraper (scrape mode).
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # --- scrape only on schedule / manual runs, not on ordinary pushes ---
      - name: Install scraper deps
        if: github.event_name != 'push'
        working-directory: scraper
        run: npm install

      - name: Scrape all clubs (fail-safe — keeps each club's last good data on error)
        if: github.event_name != 'push'
        working-directory: scraper
        env:
          # Optional. Leave the secrets unset to scrape anonymously (the default).
          LTA_USERNAME: ${{ secrets.LTA_USERNAME }}
          LTA_PASSWORD: ${{ secrets.LTA_PASSWORD }}
          SIMULATE_FAIL: ${{ github.event.inputs.simulate }}
        run: npm run scrape || echo "Scrape failed; keeping existing data"

      - name: Commit refreshed data
        if: github.event_name != 'push'
        run: |
          git config user.name "results-bot"
          git config user.email "actions@users.noreply.github.com"
          if ! git diff --quiet -- clubs; then
            git add clubs
            git commit -m "chore: refresh results [skip ci]"
            # The remote may have moved while we scraped (a concurrent push/deploy),
            # which would reject the push. Rebase onto it and retry a few times.
            pushed=0
            for i in 1 2 3; do
              if git pull --rebase --autostash origin main && git push; then pushed=1; break; fi
              echo "push attempt $i failed (remote moved?); retrying in 5s"; sleep 5
            done
            if [ "$pushed" != "1" ]; then echo "could not push refreshed data after retries"; exit 1; fi
          else
            echo "No data changes."
          fi

      # --- build the deployable site (both modes) and publish it ---
      - name: Build site
        run: node scripts/build-site.mjs

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      # Scrape health summary (for the alerting job below). Missing = scraper crashed.
      - name: Upload scrape health
        if: ${{ always() && github.event_name != 'push' }}
        uses: actions/upload-artifact@v4
        with:
          name: health
          path: scraper/health.json
          if-no-files-found: ignore

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

  # Alerting only — never blocks the deploy (which only needs `build`). If the scrape
  # failed or any club came back degraded, this job goes red so GitHub emails the owner,
  # while the site keeps showing the last-good data that `deploy` just published.
  health:
    needs: build
    if: ${{ always() && github.event_name != 'push' }}
    runs-on: ubuntu-latest
    steps:
      - name: Download scrape health
        uses: actions/download-artifact@v4
        with:
          name: health
          path: .
        continue-on-error: true
      - name: Fail if the scrape failed or degraded
        run: |
          if [ ! -f health.json ]; then
            echo "::error::No health.json — the scraper crashed before reporting. Last-good data is still live."
            exit 1
          fi
          cat health.json
          if [ "$(jq -r .anyProblem health.json)" = "true" ]; then
            echo "::error::Scrape reported problems (see warnings above). Last-good data is still live."
            exit 1
          fi
          echo "All clubs healthy."
