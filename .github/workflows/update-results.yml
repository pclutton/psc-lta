name: Update results & deploy

# Two modes, one workflow:
#   • push to main        → just rebuild & deploy the page (fast, no scraping)
#   • schedule / manual   → scrape the LTA site, commit fresh data, then deploy
on:
  schedule:
    - cron: "0 6 * * *"   # 06:00 UTC daily
  workflow_dispatch: {}
  push:
    branches: [main]

permissions:
  contents: write   # commit the refreshed results.js
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # --- scrape only on schedule / manual runs, not on ordinary pushes ---
      - name: Set up Node
        if: github.event_name != 'push'
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install scraper deps
        if: github.event_name != 'push'
        working-directory: scraper
        run: npm install

      - name: Scrape LTA results (fail-safe — keeps last good data on error)
        if: github.event_name != 'push'
        working-directory: scraper
        env:
          # Optional. Leave the secrets unset to scrape anonymously (the default).
          LTA_USERNAME: ${{ secrets.LTA_USERNAME }}
          LTA_PASSWORD: ${{ secrets.LTA_PASSWORD }}
          DEBUG: "1"   # TEMP: capture draw cross-table for the results matrix
        run: npm run scrape || echo "Scrape failed; keeping existing data/results.js"

      - name: Upload scraper debug HTML (temporary)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-debug
          path: scraper/debug/
          if-no-files-found: ignore

      - name: Commit refreshed data
        if: github.event_name != 'push'
        run: |
          git config user.name "psc-results-bot"
          git config user.email "actions@users.noreply.github.com"
          if ! git diff --quiet -- data/results.js; then
            git add data/results.js
            git commit -m "chore: refresh LTA results [skip ci]"
            git push
          else
            echo "No data changes."
          fi

      # --- always publish the current repo (page + committed data) ---
      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
